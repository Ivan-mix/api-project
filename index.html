<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"
        integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA=="
        crossorigin="anonymous"/>
    <title>Recipe App</title>
</head>
<body>
    <header class="site-header">
        <nav class="topbar">
            <div class="brand-block">
                <p class="eyebrow">Recipe Finder</p>
                <h1>Simple recipes, clear search.</h1>
                <p class="subtitle">Find a meal fast, open the details, and keep the screen clean and easy to use.</p>
            </div>
            <form class="search-panel">
                <input
                    type="text"
                    placeholder="Search for recipes..."
                    class="searchBox"
                    aria-label="Search for recipes">
                <button type="submit" class="searchBtn">Search</button>
            </form>
        </nav>
    </header>
    <main>
        <section class="content-shell">
            <div class="section-head">
                <p>Search by meal name</p>
            </div>
            <div class="recipe-container">
                <h2 class="empty-state">Search your favourite recipes</h2>
            </div>
            <div class="recipe-details">
                <button type="button" class="recipe-close-btn">Cancel</button>
                <div class="recipe-details-content"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
